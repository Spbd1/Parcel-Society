services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parcel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-parcel_society}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parcel-society

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      APP_SECRET: ${APP_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    networks:
      - parcel-society

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: tools
    profiles:
      - tools
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      APP_SECRET: ${APP_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm --filter @parcel-society/db db:deploy
    networks:
      - parcel-society

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles:
      - nginx
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/parcel-society.conf.example:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - parcel-society

volumes:
  postgres-data:

networks:
  parcel-society:
    driver: bridge
