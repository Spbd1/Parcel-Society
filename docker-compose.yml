services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parcel
      POSTGRES_PASSWORD: parcel_password
      POSTGRES_DB: parcel_society
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcel -d parcel_society"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: tools
    environment:
      DATABASE_URL: postgresql://parcel:parcel_password@postgres:5432/parcel_society?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm db:migrate

  seed-demo:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: tools
    environment:
      DATABASE_URL: postgresql://parcel:parcel_password@postgres:5432/parcel_society?schema=public
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: pnpm seed:demo

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://parcel:parcel_password@postgres:5432/parcel_society?schema=public
      APP_SECRET: replace-with-a-long-random-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed-demo:
        condition: service_completed_successfully

volumes:
  postgres-data:
