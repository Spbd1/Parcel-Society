services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parcel
      POSTGRES_PASSWORD: parcel_password
      POSTGRES_DB: parcel_society
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcel -d parcel_society"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://parcel:parcel_password@postgres:5432/parcel_society?schema=public
      APP_SECRET: replace-with-a-long-random-secret
      ADMIN_EMAIL: admin@example.org
      ADMIN_PASSWORD: replace-with-a-development-password
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
